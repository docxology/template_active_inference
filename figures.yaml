# Visualization style for template_active_inference figures.
# Loaded by src/visualizations/figure_style.py via apply_style().

dpi: 160
transparent: false
font_scale: 1.12
grid: true

typography:
  title: 13.2
  subtitle: 11.4
  header: 10.8
  axis_label: 10.4
  tick: 9.6
  legend: 9.2
  annotation: 9.0
  source_note: 8.8
  table_cell: 8.6
  matrix_label: 7.8
  matrix_label_dense: 6.8

layout:
  grid_line_width: 0.8
  matrix_grid_width: 0.35
  line_width: 2.0
  marker_size: 4.5
  card_line_width: 1.0

palette:
  primary: "#111827"
  secondary: "#2563eb"
  accent: "#0f766e"
  grid: "#d4d4d8"
  muted: "#64748b"
  reference: "#52525b"
  pass: "#0f766e"
  fail: "#b91c1c"
  proved: "#dcfce7"
  sorry: "#fee2e2"
  panel_bg: "#f9fafb"
  header_bg: "#dbeafe"

figures:
  efe_decomposition:
    filename: efe_decomposition.png
    visual_role: comparison
    evidence_role: formal
    paper_claim: >-
      Expected-free-energy policy scores split into equivalent pragmatic and
      epistemic decompositions across the finite T-maze policy set.
    alt: >-
      Two-panel bar chart of the Expected Free Energy term decomposition across the
      four length-two T-maze policies (action sequences 00, 01, 10, 11). The left
      panel stacks risk (pragmatic deviation, the KL of policy-predicted outcomes
      from preferences) below ambiguity (epistemic, the expected likelihood entropy)
      so each bar's height is the Expected Free Energy G(pi); the goal-seeking policy
      with minimum G is marked. The right panel shows the equal-and-opposite
      pragmatic value (expected log-preference) and epistemic value (state-outcome
      mutual information) per policy, with a zero reference line, illustrating the
      exact identity G(pi) = -(pragmatic + epistemic).
    caption: >-
      Closed-form Expected Free Energy decomposition over the finite T-maze policies.
      Left: $G(\pi)$ = risk + ambiguity (stacked), with the goal-seeking minimiser
      marked. Right: the pragmatic and epistemic values, which sum to $-G(\pi)$.
      Both forms are computed in closed form (no sampling) and satisfy
      risk + ambiguity + pragmatic + epistemic = 0 to machine precision.
    width: 0.95
  precision_sweep:
    filename: precision_sweep.png
    visual_role: trend
    evidence_role: formal
    paper_claim: >-
      Increasing precision concentrates posterior mass on the tied
      expected-free-energy optimal policy set rather than a single policy.
    alt: >-
      Dual-axis line plot of how the T-maze policy posterior q(pi) = softmax(-gamma G)
      sharpens as the precision gamma increases from 0 to 16. The left axis plots the
      Shannon entropy of the posterior in nats, decreasing from ln 4 at gamma=0 and
      saturating at the ln(|optimal set|) floor (a dashed reference line) because two
      policies tie at the expected-free-energy minimum. The right axis plots the
      probability mass placed on the expected-free-energy optimal policy set, rising
      from 0.5 toward 1 and crossing the selection threshold; the precision at which it
      crosses is marked.
    caption: >-
      Precision sweep over the closed-form T-maze policy posterior
      $q(\pi)\propto\exp(-\gamma G)$ across {{precision_gamma_grid_points}} grid
      points up to $\gamma$={{precision_gamma_max}}. Entropy falls from $\ln 4$ to the
      $\ln|\Pi^\star|$ floor ({{precision_optimal_set_size}} tied optima, second action
      irrelevant under the absorbing goal); the optimal-set mass crosses
      {{precision_selection_threshold}} at $\gamma$={{precision_gamma_deterministic}}.
      Entropy at $\gamma$=1 is {{precision_entropy_at_gamma_one_formatted}} nats.
      Computed in closed form (no sampling).
    width: 0.9
  cue_tmaze_advantage:
    filename: cue_tmaze_advantage.png
    visual_role: comparison
    evidence_role: formal
    paper_claim: >-
      The cue-then-reward variant shows why observation-conditioned evaluation is
      needed for information-seeking to have behavioral value.
    alt: >-
      Two-panel bar chart for the cue-then-reward T-maze. The left panel shows the
      cue information gain I(context; observation) in nats and the expected reward
      log-preference for an epistemic agent that samples the cue versus a greedy
      agent that commits to an arm, demonstrating a positive behavioural advantage
      for cue-sampling. The right panel shows the flat Expected Free Energy of the
      cue-first and greedy policies, which are identical, illustrating that flat EFE
      propagation cannot reward cue-sampling and the sophisticated observation-
      conditioned evaluator is required.
    caption: >-
      Cue-then-reward T-maze where epistemic value is strictly necessary. Left: the
      cue carries {{cue_information_gain_formatted}} nats of information and the
      cue-sampling agent reaches reward with a measured advantage of
      {{cue_behavioral_advantage_formatted}} nats over a greedy agent. Right: flat
      Expected Free Energy scores the cue-first and greedy policies identically
      ({{cue_flat_efe_indistinguishable}}), so the sophisticated observation-
      conditioned evaluator is what makes information-seeking required. Closed form
      (no sampling).
    width: 0.95
  dirichlet_convergence:
    filename: dirichlet_convergence.png
    visual_role: trend
    evidence_role: formal
    paper_claim: >-
      Deterministic Dirichlet updates monotonically move the learned likelihood
      toward the true finite T-maze observation model.
    alt: >-
      Single-panel semilog line chart of the Kullback-Leibler divergence from the
      true T-maze likelihood matrix A to the Dirichlet-learned expected likelihood,
      plotted against the update step. The divergence starts large at the uniform
      prior and falls monotonically toward zero as deterministic observation-state
      counts accumulate, crossing a dashed convergence-tolerance reference line; the
      first step below tolerance is marked. The curve is computed in closed form
      from a fixed expected-count stream (no sampling).
    caption: >-
      Dirichlet model learning: KL$(A_{\text{true}} \,\|\, A_{\text{learned}})$ versus
      concentration-update step. The expected likelihood $E[A] = pA / \sum_o pA$
      converges monotonically to the true generative likelihood; the run reaches the
      convergence tolerance at step {{dirichlet_steps_to_converge}} with final KL
      {{dirichlet_final_kl_formatted}} nats. Deterministic (no sampling), so the
      curve is byte-reproducible.
    width: 0.85
  ising_mi_curve:
    filename: ising_mi_curve.png
    visual_role: trend
    evidence_role: statistical
    paper_claim: >-
      The analytical mutual-information curve is reproduced by an independent
      exact total-correlation computation across the lambda grid.
    alt: >-
      Two-panel plot of mutual information versus coupling strength lambda for the
      symmetric Bernoulli-Ising toy. Left panel shows the closed-form curve (solid dark
      line) and an independent exact recomputation via total correlation (dashed blue
      line) with lambda on the x-axis and mutual information in nats on the y-axis. Right
      panel shows the recompute-minus-closed-form residual versus lambda with a zero
      reference line; the two deterministic estimators agree to machine precision.
    caption: >-
      Closed-form $I(\lambda)$ and an independent exact recomputation via total correlation for
      the symmetric Bernoulli-Ising toy across {{param_sweep_grid_points}} grid points up
      to $\lambda_{\max}$ = {{lambda_max}}; grid maximum {{ising_mi_saturation}} nats. Both estimators
      are deterministic (no sampling), so the right panel is a cross-implementation
      agreement check (max residual {{sweep_max_residual}} nats), not a sampling residual.
    width: 0.9
  free_energy_curve:
    filename: free_energy_curve.png
    visual_role: trend
    evidence_role: formal
    paper_claim: >-
      Free energy against the mean-field prior is minimized at the independence
      point and rises as coupling increases.
    alt: >-
      Line plot of free energy in nats versus coupling strength lambda for the
      entangled posterior relative to a mean-field prior. The entangled-prior free
      energy is identically zero, so this plotted comparison isolates mean-field
      prior mismatch. A single dark curve traces free energy across the sweep; the
      minimum is marked with a teal scatter point and labeled with the argmin
      lambda value.
    caption: >-
      Free energy of the entangled posterior relative to the mean-field prior across
      the hyperparameter sweep (grid points {{param_sweep_grid_points}}); relative
      to the entangled prior, the same posterior has identically zero free energy.
    width: 0.9
  si_tmaze_actions:
    filename: si_tmaze_actions.png
    visual_role: trace
    evidence_role: statistical
    paper_claim: >-
      The saved T-maze action trace records the finite rollout policy behavior
      used by the manuscript statistics.
    alt: >-
      Step plot of discrete action index versus timestep for the pymdp
      T-maze rollout in {{pymdp_mode}} mode. Actions change at each timestep with
      light fill under the step trace; policy depth is {{si_tmaze_policy_len}} steps.
    caption: >-
      Discrete action index over time for the pymdp T-maze rollout (policy length
      {{si_tmaze_policy_len}}).
    width: 0.9
  si_belief_entropy_curve:
    filename: si_belief_entropy_curve.png
    visual_role: trend
    evidence_role: statistical
    paper_claim: >-
      The belief entropy trace shows the finite toy rollout posterior remains
      stable across the observed timesteps.
    alt: >-
      Line plot of belief entropy in nats versus timestep for the pymdp T-maze rollout.
      Entropy ranges from {{si_entropy_min}} to {{si_entropy_max}} nats across
      {{si_tmaze_steps}} steps in {{pymdp_mode}} mode.
    caption: >-
      Belief entropy over time for the T-maze rollout (mean {{si_tmaze_mean_belief_entropy_formatted}} nats).
    width: 0.9
  si_obs_action_trace:
    filename: si_obs_action_trace.png
    visual_role: trace
    evidence_role: statistical
    paper_claim: >-
      Observation and action traces expose the exact finite sequence behind the
      reported T-maze rollout summary.
    alt: >-
      Dual-panel plot of observation index and action index versus timestep for the
      pymdp T-maze rollout. The upper panel shows discrete observations; the lower panel
      shows actions. Goal reached flag is {{si_goal_reached}}.
    caption: >-
      Observation and action traces for the T-maze rollout (action diversity
      {{si_action_diversity}}).
    width: 0.9
  sheaf_coverage_heatmap:
    filename: sheaf_coverage_heatmap.png
    visual_role: matrix
    evidence_role: sheaf
    paper_claim: >-
      The coverage matrix makes every manifest-section by sheaf-track binding
      auditable before composition.
    alt: >-
      Heatmap matrix of IMRAD manuscript rows versus {{sheaf_track_count}} sheaf
      fragment track columns. Black cells mean the track is bound and the fragment
      file exists; white cells mean the track is not bound; gray cells mean bound
      but missing. Rows are grouped by IMRAD block with indented subsection labels;
      column headers list track ids.
    caption: >-
      Sheaf track coverage matrix: {{imrad_manifest_rows}} IMRAD rows ×
      {{sheaf_track_count}} fragment columns. Black = present (P), white = absent (—),
      gray = missing (M). Counts: {{coverage_present}} present / {{coverage_bound}} bound /
      {{coverage_missing}} missing. Generated from `output/data/sheaf_coverage_matrix.json`.
    width: 0.95
  sheaf_layers_overview:
    filename: sheaf_layers_overview.png
    visual_role: dashboard
    evidence_role: sheaf
    paper_claim: >-
      The sheaf layer overview links the registry stack to the IMRAD binding
      matrix used by strict composition.
    alt: >-
      Two-panel overview of sheaf fragment layers. Left panel shows
      {{sheaf_track_count}} composable track types in registry compose order with
      labels and renderer ids. Right panel shows the IMRAD section binding heatmap
      with black present, white absent, and gray missing cells across
      {{imrad_manifest_rows}} manifest rows and {{sheaf_track_count}} tracks.
    caption: >-
      Sheaf layers overview: registry stack (compose order, renderer ids) and IMRAD binding
      heatmap for {{sheaf_track_count}} fragment types across {{imrad_manifest_rows}} manifest
      rows ({{coverage_present}} present / {{coverage_bound}} bound / {{coverage_missing}}
      missing), generated from `output/data/sheaf_coverage_matrix.json`.
    width: 0.98
  invariant_dashboard:
    filename: invariant_dashboard.png
    visual_role: dashboard
    evidence_role: statistical
    paper_claim: >-
      The invariant dashboard shows that all analytical and simulation checks
      pass on the merged validation report.
    alt: >-
      Horizontal bar checklist of analytical and simulation invariant names with pass or fail
      status. {{invariants_passed}} of {{invariants_total}} checks pass on the merged report.
    caption: >-
      Invariant dashboard: {{invariants_passed}} / {{invariants_total}} merged analytical and
      simulation checks from the validation registry.
    width: 0.9
  tmaze_schematic:
    filename: tmaze_schematic.png
    visual_role: diagram
    evidence_role: schematic
    paper_claim: >-
      The T-maze schematic fixes the finite state, observation, action, and
      policy-horizon assumptions used by pymdp.
    alt: >-
      Schematic of the minimal T-maze POMDP with start and goal states, discrete actions and
      observations, and planning horizon policy_len = {{si_tmaze_policy_len}}.
    caption: >-
      T-maze generative model schematic ({{si_tmaze_policy_len}}-step policy horizon,
      {{pymdp_mode}} mode).
    width: 0.85
  multi_track_architecture:
    filename: multi_track_architecture.png
    visual_role: flow
    evidence_role: sheaf
    paper_claim: >-
      The architecture diagram connects scientific lanes, pipeline gates, and
      sheaf fragments into one reproducible manuscript system.
    alt: >-
      Process diagram linking three scientific tracks to {{pipeline_track_count}} pipeline gates
      and {{sheaf_track_count}} sheaf fragment types across {{imrad_manifest_rows}} manifest rows.
    caption: >-
      Multi-track architecture: analytical, pymdp, and sheaf composition lanes mapped to
      {{pipeline_track_count}} pipeline gates and {{sheaf_track_count}} composable fragment types.
    width: 0.95
  lean_boundary_status:
    filename: lean_boundary_status.png
    visual_role: table
    evidence_role: formal
    paper_claim: >-
      The Lean boundary table distinguishes proved finite witnesses from
      intentionally scoped formalization boundaries.
    alt: >-
      Table figure listing Lean modules, declaration kinds, names, and proved versus sorry status
      under lean/TemplateActiveInference/.
    caption: >-
      Lean formalization boundary: module witnesses checked by lake build.
    width: 0.9
  gnn_ontology_concordance:
    filename: gnn_ontology_concordance.png
    visual_role: flow
    evidence_role: formal
    paper_claim: >-
      The concordance diagram maps analytical symbols through GNN variables into
      Active Inference Ontology terms.
    alt: >-
      Layered concordance diagram linking analytical symbols, GNN variables from
      bernoulli_toy.gnn.md ({{gnn_spec_version}}), and Active Inference Ontology terms.
    caption: >-
      GNN $\leftrightarrow$ ontology concordance for the Bernoulli–Ising toy ({{gnn_spec_version}}).
    width: 0.9
  semantic_gluing_graph:
    filename: semantic_gluing_graph.png
    visual_role: flow
    evidence_role: sheaf
    paper_claim: >-
      The semantic gluing graph shows which generated artifacts connect producers
      to manuscript consumers and validation gates.
    alt: >-
      Dependency diagram linking configured analysis scripts to generated evidence
      artifacts, manuscript consumers, and validation gates for the semantic sheaf
      gluing certificate.
    caption: >-
      Semantic gluing graph: configured producers, generated evidence artifacts, and
      validation consumers for the multi-track sheaf certificate.
    width: 0.95
  track_lane_promotion_map:
    filename: track_lane_promotion_map.png
    visual_role: matrix
    evidence_role: sheaf
    paper_claim: >-
      The track-lane promotion map makes the seven promotion-rule obligations and
      sheaf-lane bindings inspectable for every public pipeline track.
    alt: >-
      Two-panel matrix generated from track_lane_matrix.json. The left panel lists
      pipeline tracks against producer, artifact, manuscript consumer, typed claim,
      semantic restriction, validation gate, and negative control obligations. The
      right panel shows the sheaf fragment lanes bound to each pipeline track.
    caption: >-
      Track-lane promotion map: {{track_lane_matrix_row_count}} pipeline-to-sheaf
      rows with complete promotion status {{track_lane_matrix_complete}}. Left:
      seven promotion-rule obligations; right: sheaf fragment bindings.
    width: 0.98
  artifact_contract_map:
    filename: artifact_contract_map.png
    visual_role: matrix
    evidence_role: sheaf
    paper_claim: >-
      The artifact contract map makes producer, validator, claim, freshness, and
      copied-output parity obligations inspectable for every generated artifact
      in the semantic contract.
    alt: >-
      Matrix generated from artifact_contract_index.json. Rows are generated
      artifacts; columns show producer configured, source present, claim bound
      or exempt, validation gate, negative control, freshness hash, copied-output
      parity, and complete contract status.
    caption: >-
      Artifact contract map: {{artifact_contract_row_count}} generated artifact
      rows with complete contract status {{artifact_contract_complete}} and
      copied-output parity complete {{artifact_contract_copied_parity_complete}}.
      Cycle rows are explicit in `output/data/artifact_contract_index.json`.
    width: 0.98
  theorem_traceability_graph:
    filename: theorem_traceability_graph.png
    visual_role: flow
    evidence_role: formal
    paper_claim: >-
      The theorem traceability graph connects Lean theorem rows to dependency
      edges and finite model witnesses.
    alt: >-
      Three-column graph generated from theorem traceability and proof dependency JSON.
      Each row links a Lean theorem to its proof-dependency edge count and finite
      model witness count; all theorem rows have resolved dependency edges:
      {{proof_dependency_all_resolved}}.
    caption: >-
      Theorem traceability graph generated from {{theorem_traceability_row_count}}
      linked theorem rows and {{proof_dependency_edge_count}} proof-dependency edges.
    width: 0.95
  causal_ablation_heatmap:
    filename: causal_ablation_heatmap.png
    visual_role: matrix
    evidence_role: statistical
    paper_claim: >-
      The causal-ablation heatmap summarizes source-backed deterministic effects
      across toy topologies and perturbations.
    alt: >-
      Heatmap generated from the causal ablation and sensitivity reports. Rows are
      toy graph topologies, columns are perturbation types, and each cell shows the
      maximum absolute deterministic effect sourced from generated JSON rows.
    caption: >-
      Causal-ablation heatmap: {{ablation_sensitivity_row_count}} source-backed rows
      joined to sensitivity and uncertainty artifacts; all effects source-backed:
      {{ablation_sensitivity_source_backed}}.
    width: 0.92
  scholarship_source_map:
    filename: scholarship_source_map.png
    visual_role: flow
    evidence_role: scholarship
    paper_claim: >-
      The scholarship source map separates bibliography lineage from generated
      evidence artifacts, citation-section evidence, and scoped claim boundaries.
    alt: >-
      Five-column source map generated from the scholarship source matrix. Each row
      links a bibliography key to a DOI or URL locator, manuscript citation
      status, guarded scope boundary, method role, and generated evidence artifact;
      green borders mark rows rederived from bibliography entries, manuscript citations,
      registered tracks, bound manuscript sections, and existing artifacts.
    caption: >-
      Scholarship source map: {{scholarship_source_count}} source rows across
      {{scholarship_method_role_count}} method roles and
      {{scholarship_source_family_count}} source families. Connected status:
      {{scholarship_sources_connected}}; row evidence rederived:
      {{scholarship_rows_rederived}}.
    width: 0.95
  security_posture_map:
    filename: security_posture_map.png
    visual_role: matrix
    evidence_role: source_mapped
    paper_claim: >-
      The security posture map separates enforced local controls from deferred
      production-security obligations and links each row to generated evidence.
    alt: >-
      Matrix generated from security_posture_audit.json. Rows are defensive
      controls such as public data boundary, offline reproducibility, hash
      integrity, release parity, claim traceability, formal boundary, secret scan,
      signed attestation, and zero-trust runtime boundary; columns show evidence,
      validator, negative-control, scoping, and overall status.
    caption: >-
      Security posture map: {{security_posture_control_count}} controls,
      {{security_posture_enforced_count}} enforced and
      {{security_posture_deferred_count}} scoped as deferred; secret findings:
      {{security_posture_secret_finding_count}}; high-risk gaps:
      {{security_posture_high_risk_gap_count}}.
    width: 0.96

