domain: active_inference
display_name: Active Inference Multi-Track Exemplar
required_packages:
  - numpy
  - matplotlib
  - scipy
  - inferactively-pymdp
validation_gates:
  - artifact_manifest
  - evidence_grounding
  - render_validation
  - publication_readiness
figure_types:
  - ising_mi_curve
  - free_energy_curve
  - si_tmaze_actions
  - si_belief_entropy_curve
  - si_obs_action_trace
  - sheaf_coverage_heatmap
  - sheaf_layers_overview
  - invariant_dashboard
  - tmaze_schematic
  - multi_track_architecture
  - lean_boundary_status
  - gnn_ontology_concordance
  - semantic_gluing_graph
artifact_expectations:
  - output/data/parameter_sweep.csv
  - output/data/si_tmaze_summary.json
  - output/data/si_tmaze_trace.json
  - output/data/analysis_statistics.json
  - output/data/manuscript_variables.json
  - output/data/sheaf_gluing_certificate.json
  - output/data/sheaf_evidence_crosswalk.json
  - output/data/validation_dependency_graph.json
  - output/data/si_policy_comparison.json
  - output/data/si_graph_world_summary.json
  - output/data/si_graph_world_trace.json
  - output/figures/ising_mi_curve.png
  - output/figures/free_energy_curve.png
  - output/figures/si_tmaze_actions.png
  - output/figures/si_belief_entropy_curve.png
  - output/figures/si_obs_action_trace.png
  - output/figures/sheaf_layers_overview.png
  - output/figures/sheaf_coverage_heatmap.png
  - output/figures/invariant_dashboard.png
  - output/figures/tmaze_schematic.png
  - output/figures/multi_track_architecture.png
  - output/figures/lean_boundary_status.png
  - output/figures/gnn_ontology_concordance.png
  - output/figures/semantic_gluing_graph.png
  - output/figures/si_belief_trajectory.gif
  - output/figures/figure_registry.json
  - output/data/sheaf_coverage_matrix.json
  - output/reports/invariants.json
  - output/reports/si_tmaze_run_report.json
  - output/reports/si_invariants.json
  - pymdp.yaml
review_gates:
  - artifact_manifest
  - invariant_validation
  - render_validation
  - publication_readiness
source_policy: >-
  Treat generated analytical, SI rollout, sheaf, and figure-registry artifacts
  as the source of truth. Do not promote manuscript claims unless they resolve
  to tracked code, declared tracks, or regenerated output JSON/figures.
benchmark_rubric:
  name: active-inference-readiness
  dimensions:
    - name: invariant_pass_status
      weight: 2.0
    - name: sheaf_coverage
      weight: 2.0
    - name: artifact_traceability
      weight: 1.5
    - name: figure_registry_completeness
      weight: 1.0
    - name: render_success
      weight: 1.0
llm_prompt_guidance: >-
  Ground all summaries in the generated output/data and output/reports artifacts;
  separate analytical closed-form facts, pymdp rollout evidence, and sheaf
  integration checks rather than blending them into one undifferentiated claim.
