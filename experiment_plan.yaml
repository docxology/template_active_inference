    role: reference
    description: Closed-form Bernoulli-Ising mutual information and invariant checks.
  - name: pymdp_tmaze_rollout
    role: proposed
    description: Configured pymdp sophisticated-inference T-maze rollout with persisted trace and summary artifacts.
  - name: sheaf_manifest_composition
    role: variant
    description: Registry-driven manuscript composition with coverage matrix and generated layers report.
  - name: semantic_sheaf_gluing
    role: variant
    description: Cross-track certificate tying symbols, claims, artifacts, and manuscript variables together.
